<!DOCTYPE html>
<html class="dark" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#13ec6d",
                        "background-light": "#f6f8f7",
                        "background-dark": "#102218",
                        "neutral-dark": "#1a2e23",
                        "neutral-border": "#213d2d",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<title>Inicio de Sesión Seguro - App de Presupuestos</title>
<style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col justify-center overflow-hidden">
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary/10 rounded-full blur-3xl"></div>
<div class="absolute -bottom-24 -right-24 w-96 h-96 bg-primary/5 rounded-full blur-3xl"></div>
</div>
<main class="relative z-10 w-full max-w-md mx-auto px-8">
<div class="text-center mb-12">
<div class="inline-flex items-center justify-center w-20 h-20 bg-primary/20 rounded-2xl mb-6">
<span class="material-icons-round text-primary text-5xl">account_balance_wallet</span>
</div>
<h1 class="text-3xl font-extrabold tracking-tight dark:text-white mb-2">Bienvenido</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm max-w-xs mx-auto">
                Acceda de forma segura a sus carteras multimoneda y controles de presupuesto.
            </p>
</div>
<form class="space-y-5">
<div class="space-y-2">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400 ml-1" for="email">
                    Correo electrónico
                </label>
<div class="relative group">
<span class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-4 bg-white dark:bg-neutral-dark border-transparent dark:border-neutral-border focus:border-primary dark:focus:border-primary focus:ring-1 focus:ring-primary rounded-xl transition-all outline-none text-slate-800 dark:text-slate-100" id="email" placeholder="usuario@dominio.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-semibold uppercase tracking-wider text-slate-500 dark:text-slate-400" for="password">
                        Contraseña
                    </label>
<a class="text-xs font-medium text-primary hover:text-primary/80" href="#">¿Olvidó su clave?</a>
</div>
<div class="relative group">
<span class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-white dark:bg-neutral-dark border-transparent dark:border-neutral-border focus:border-primary dark:focus:border-primary focus:ring-1 focus:ring-primary rounded-xl transition-all outline-none text-slate-800 dark:text-slate-100" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200" type="button">
<span class="material-icons-round text-xl">visibility_off</span>
</button>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-background-dark font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] mt-4" type="submit">
                Iniciar sesión
            </button>
</form>
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-neutral-border"></div>
</div>
<div class="relative flex justify-center text-xs uppercase tracking-widest">
<span class="bg-background-light dark:bg-background-dark px-4 text-slate-500">Acceso Seguro</span>
</div>
</div>
<div class="flex flex-col items-center space-y-8">
<button class="flex items-center justify-center w-14 h-14 rounded-full bg-slate-200 dark:bg-neutral-dark border border-slate-300 dark:border-neutral-border text-slate-600 dark:text-slate-300 hover:border-primary transition-colors" type="button">
<span class="material-icons-round text-3xl">fingerprint</span>
</button>
<p class="text-sm text-slate-500 dark:text-slate-400">
                ¿No tiene una cuenta? 
                <a class="text-primary font-bold hover:underline" href="#">Registrarse</a>
</p>
</div>
</main>
<footer class="mt-auto pb-8 text-center">
<div class="flex items-center justify-center gap-2 text-slate-400 dark:text-slate-600 text-xs uppercase tracking-widest">
<span class="material-icons-round text-xs">verified_user</span>
<span>Sistema Encriptado AES de 256 bits</span>
</div>
</footer>
<div class="fixed top-6 right-6 flex items-center gap-2 bg-neutral-dark border border-neutral-border rounded-full py-1.5 px-3">
<span class="w-2 h-2 bg-primary rounded-full animate-pulse"></span>
<span class="text-[10px] font-bold text-slate-300 uppercase tracking-tighter">Sistema Listo</span>
</div>

</body></html>
